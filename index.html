<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry Dash(Google)</title>
    <style>
        :root {
            --bg-color: #000;
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ff;
            --font-main: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: var(--font-main);
            color: white;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(45deg, #050505, #111);
        }

        canvas {
            display: block;
            background-color: transparent;
            image-rendering: pixelated;
        }

        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: auto;
            z-index: 10;
        }

        h1 {
            font-size: 5rem;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 0.5rem;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue), 0 0 40px var(--neon-blue);
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            from {
                text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
            }

            to {
                text-shadow: 0 0 20px var(--neon-blue), 0 0 40px var(--neon-pink), 0 0 60px var(--neon-pink);
            }
        }

        .btn {
            padding: 1rem 3rem;
            font-size: 1.5rem;
            background: transparent;
            color: white;
            border: 2px solid white;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .btn:hover {
            background: white;
            color: black;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
            transform: scale(1.1);
        }

        #hud {
            width: 100%;
            padding: 20px;
            display: none;
            flex-direction: column;
            align-items: center;
        }

        #progress-container {
            width: 60%;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.3);
            margin-top: 10px;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink));
            box-shadow: 0 0 10px var(--neon-blue);
            transition: width 0.1s linear;
        }

        /* Level Editor Styles */
        #editor-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            display: none;
            flex-direction: column;
            gap: 10px;
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border: 1px solid var(--neon-blue);
            border-radius: 8px;
            z-index: 20;
        }

        .editor-btn {
            padding: 8px 15px;
            background: transparent;
            color: white;
            border: 1px solid white;
            cursor: pointer;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .editor-btn.active {
            background: var(--neon-blue);
            color: black;
            border-color: var(--neon-blue);
        }

        #editor-controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: none;
            gap: 10px;
            pointer-events: auto;
            z-index: 20;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <div id="ui-overlay">
            <div id="menu">
                <h1>GEOMETRY DASH<br>(GOOGLE)</h1>
                <div id="active-level-display"
                    style="margin-bottom: 2rem; color: var(--neon-pink); font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px;">
                    ACTIVE LEVEL: NO LEVEL LOADED
                </div>
                <button class="btn" id="start-btn">PLAY</button>
            </div>

            <div id="hud">
                <div id="progress-container">
                    <div id="progress-bar"></div>
                </div>
            </div>

            <!-- Level Editor UI -->
            <div id="editor-ui">
                <h3 style="margin:0 0 10px 0; color:var(--neon-blue)">LEVEL EDITOR</h3>
                <button class="editor-btn active" id="tool-spike">SPIKE (S)</button>
                <button class="editor-btn" id="tool-block">BLOCK (B)</button>
                <button class="editor-btn" id="tool-erase">ERASE (E)</button>
                <hr style="width:100%; border:0; border-top:1px solid #444">
                <button class="editor-btn" id="publish-btn"
                    style="border-color:var(--neon-pink); color:var(--neon-pink)">PUBLISH</button>
                <button class="editor-btn" id="exit-editor-btn">EXIT</button>
            </div>

            <div id="editor-controls">
                <span style="color:#888; font-size: 0.8rem;">Left Click: Place | Right Click: Erase</span>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>

</html>
